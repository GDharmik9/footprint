# Google Cloud Build pipeline configuration steps:
steps:
  # 1. Build the API container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-api'
    args:
      - 'build'
      - '-t'
      - '${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-api:${COMMIT_SHA}'
      - '-t'
      - '${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-api:latest'
      - '-f'
      - 'apps/api/Dockerfile'
      - '.'

  # 2. Build the Web Dashboard container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-web'
    args:
      - 'build'
      - '-t'
      - '${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-web:${COMMIT_SHA}'
      - '-t'
      - '${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-web:latest'
      - '-f'
      - 'apps/web/Dockerfile'
      - '.'

  # NEW STEP: Push the images immediately so Cloud Run can see them
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-images'
    args:
      - 'push'
      - '--all-tags'
      - '${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-api'
      - 'push'
      - '--all-tags'
      - '${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-web'

  # 3. Deploy the API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-api'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'footprint-api'
      - '--image=${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-api:${COMMIT_SHA}'
      - '--region=${_AR_LOCATION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      # Injecting secrets from Secret Manager natively into the environment
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest'
      # Providing the Pub/Sub subscription name we verified earlier
      - '--set-env-vars=PUBSUB_SUBSCRIPTION=carbon-events-topic-sub'

  # 4. Deploy the Web Dashboard to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-web'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'footprint-web'
      - '--image=${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-web:${COMMIT_SHA}'
      - '--region=${_AR_LOCATION}'
      - '--platform=managed'
      - '--allow-unauthenticated'

# Default values for substitution variables
substitutions:
  _AR_LOCATION: 'us-central1'
  _AR_REPOSITORY: 'footprint'

options:
  logging: CLOUD_LOGGING_ONLY

# Safe keeping for artifacts tracking
images:
  - '${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-api:${COMMIT_SHA}'
  - '${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-api:latest'
  - '${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-web:${COMMIT_SHA}'
  - '${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/footprint-web:latest'
